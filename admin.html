<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hamburger Pictures Admin</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="content-default.js"></script>
    <script src="admin.js" defer></script>
  </head>
  <body class="admin-page">
    <main class="admin-shell">
      <section class="admin-panel">
        <div>
          <p class="eyebrow">Admin</p>
          <h1>Website Manager</h1>
        </div>
        <label>
          Admin Token
          <input id="admin-token" type="password" autocomplete="current-password" />
        </label>
        <button class="button primary" id="load-admin" type="button">Load</button>
      </section>

      <section class="admin-panel">
        <h2>Showreel</h2>
        <label>
          YouTube URL or Embed URL
          <input id="showreel-url" type="url" placeholder="https://youtu.be/..." />
        </label>
      </section>

      <section class="admin-panel">
        <div class="admin-row">
          <h2>해왔던 일</h2>
          <button class="button ghost" id="add-work" type="button">Add Work</button>
        </div>
        <div id="work-editor" class="work-editor"></div>
      </section>

      <section class="admin-panel">
        <div class="admin-row">
          <h2>접수된 문의</h2>
          <button class="button ghost" id="refresh-contacts" type="button">Refresh</button>
        </div>
        <div id="contact-list" class="contact-list"></div>
      </section>

      <div class="admin-actions">
        <button class="button primary" id="save-admin" type="button">Save Website</button>
        <p id="admin-status" role="status"></p>
      </div>
    </main>
  </body>
</html>
